spring.datasource.url=jdbc:h2:mem:techcenter_regression_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE DOMAIN IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.docker.compose.enabled=false

app.auth.jwt.secret=change-me-change-me-change-me-change-me
app.auth.jwt.expiration-seconds=900
app.auth.jwt.issuer=techcenter-backend-test
