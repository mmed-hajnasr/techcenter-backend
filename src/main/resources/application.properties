spring.application.name=techcenter-backend
spring.docker.compose.enabled=false
spring.datasource.url=jdbc:postgresql://${DATABASE__HOST:localhost}:${DATABASE__PORT:5432}/${DATABASE__NAME:${POSTGRES_DB:techcenter}}
spring.datasource.username=${DATABASE__USERNAME:${POSTGRES_USER:postgres}}
spring.datasource.password=${DATABASE__PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

spring.sql.init.mode=always

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-seconds=${JWT_EXPIRATION:86400}
app.jwt.issuer=${JWT_ISSUER:techcenter-backend}
